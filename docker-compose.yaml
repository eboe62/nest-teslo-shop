# Docker Compose para backend y base de datos
version: '3.8'
services:
  
  # Servicio de PostgreSQL
  db:
    image: postgres:14.3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # puerto estándar de PostgreSQL
    networks:
      - app-network
  
  # Servicio del Backend (NestJS)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3000" # El puerto 3001 es el puerto expuesto en la máquina host, 3000 es el que usa la app dentro del contenedor
    environment:
      STAGE: ${STAGE}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    external: false

volumes:
  db-data:
